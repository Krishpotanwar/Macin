name: MacinDownloadManager
options:
  bundleIdPrefix: com.krishpotanwar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_HARDENED_RUNTIME: YES
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  MacinDownloadManager:
    type: application
    platform: macOS
    sources:
      - path: MacinApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.krishpotanwar.macin
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Macin
        INFOPLIST_KEY_NSHighResolutionCapable: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: MacinApp.entitlements

  MacinNativeMessagingHost:
    type: tool
    platform: macOS
    sources:
      - path: NativeMessagingHost
        excludes:
          - Manifests/**
          - install_manifests.sh
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.krishpotanwar.macin.nmh
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: MacinNativeMessagingHost

