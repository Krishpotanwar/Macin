<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1c1c1e;
      color: #f2f2f7;
      margin: 0;
    }
    h2 {
      font-size: 15px;
      font-weight: 600;
      margin: 0 0 12px;
      color: #f2f2f7;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #3a3a3c;
      background: #2c2c2e;
      color: #f2f2f7;
      font-size: 13px;
      box-sizing: border-box;
      outline: none;
    }
    input::placeholder { color: #636366; }
    .btn-primary {
      margin-top: 10px;
      width: 100%;
      padding: 9px;
      border-radius: 8px;
      border: none;
      background: #0a84ff;
      color: white;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-primary:hover { background: #409cff; }
    .btn-secondary {
      margin-top: 8px;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #3a3a3c;
      background: transparent;
      color: #ebebf5cc;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-secondary:hover { background: #2c2c2e; }
    #status {
      margin-top: 10px;
      font-size: 12px;
      color: #30d158;
      min-height: 16px;
    }
    .divider {
      margin: 10px 0 4px;
      border: none;
      border-top: 1px solid #3a3a3c;
    }
  </style>
</head>
<body>
  <h2>Macin Download Manager</h2>
  <input type="url" id="urlInput" placeholder="Paste URL here..." />
  <button class="btn-primary" id="addBtn">Send to Macin</button>
  <div id="status"></div>
  <hr class="divider">
  <button class="btn-secondary" id="folderBtn">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
      <path d="M1 3.5A1.5 1.5 0 012.5 2h3.672a1.5 1.5 0 011.06.44L8.293 3.5H13.5A1.5 1.5 0 0115 5v7.5A1.5 1.5 0 0113.5 14h-11A1.5 1.5 0 011 12.5v-9z"/>
    </svg>
    Open Downloads Folder
  </button>
  <script src="popup.js"></script>
</body>
</html>
